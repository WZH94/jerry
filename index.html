<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="mystyle.css">
		<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
		integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
		crossorigin=""/>

		<!-- Make sure you put this AFTER Leaflet's CSS -->
		<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
			integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
			crossorigin=""></script>
		<script src="./plugins/leaflet.ajax.min.js"></script>
		<script src="./plugins/papaparse.min.js"></script>
	</head>

	<body class="">	
		<div id="map"></div>
		<script src="data/electoral-boundaries-data.js" type="text/javascript"></script>
		<script>
			const blueLowestColour = "#f7fbff";
			const blueHighestColour = "#08306b";
			
			const redLowestColour = "#fff5f0	";
			const redHighestColour = "#67000d";
			
			const defaultColour = "#737373";
			
			var map;
			var geojson;
			var changedGeojson;
			var results;
			
			var layerControl;
			var yearIndicatorControl;
			var exitOverlayButton;
			var voteMarginLegend;
			
			var overlayBackground;

			var mousePosition;
			var hoverPopup;
		
			const maxIndex = 4;
			const years = ["2006", "2011", "2015", "2020", "2025"];
			var displayedYear = "2025";
			var yearIndex = maxIndex;
			
			const maxBounds = [
					[1.5509, 103.4033],
					[1.1020, 104.2177]
				];
			
			const equivalentBoundaryNames = [
				["West Coast", "West Coast-Jurong West"],
				["Jurong", "Jurong East-Bukit Batok"],
				["Marine Parade", "Marine Parade-Braddell Heights"]
			]
			
			function doesBoundaryNameMatch(compare, against) {
				// First check against equivalent boundary names
				for (const entry of equivalentBoundaryNames) {
					const isCompareMatch = (compare.localeCompare(entry[0]) == 0) || (compare.localeCompare(entry[1]) == 0);
					const isAgainstMatch = (against.localeCompare(entry[0]) == 0) || (against.localeCompare(entry[1]) == 0);
					
					if (isCompareMatch && isAgainstMatch) {
						return true;
					}
				}
				
				return compare.localeCompare(against) == 0;
			}
			
			const boundariesData = [
				"./data/2006 Electoral Boundaries.geojson",
				"./data/2011 Electoral Boundaries.geojson",
				"./data/2015 Electoral Boundaries.geojson",
				"./data/2020 Electoral Boundaries.geojson",
				"./data/2025 Electoral Boundaries.geojson"
			];
			
			function getBoundariesDataOfYear(year) {
				return year.localeCompare("2006") == 0 ? boundariesData[0] :
					   year.localeCompare("2011") == 0 ? boundariesData[1] :
					   year.localeCompare("2015") == 0 ? boundariesData[2] :
					   year.localeCompare("2020") == 0 ? boundariesData[3] :
					   year.localeCompare("2025") == 0 ? boundariesData[4] :
					   "";
			}
			
			const boundariesChangedData = [
				"./data/2006 - 2011 Electoral Boundaries Changes.geojson",
				"./data/2011 - 2015 Electoral Boundaries Changes.geojson",
				"./data/2015 - 2020 Electoral Boundaries Changes.geojson",
				"./data/2020 - 2025 Electoral Boundaries Changes.geojson"
			];
			
			function getChangedBoundariesDataOfYear(year) {
				return year.localeCompare("2006") == 0 ? boundariesChangedData[0] :
					   year.localeCompare("2011") == 0 ? boundariesChangedData[1] :
					   year.localeCompare("2015") == 0 ? boundariesChangedData[2] :
					   year.localeCompare("2020") == 0 ? boundariesChangedData[3] :
					   "";
			}
			
			function canYearBeIncremented() {
				return yearIndex < maxIndex;
			}
			
			function incrementYear() {
				if (canYearBeIncremented()) {
					yearIndex += 1;
					displayedYear = years[yearIndex];
				}
			}
			
			function canYearBeDecremented() {
				return yearIndex > 0;
			}
			
			function decrementYear() {
				if (canYearBeDecremented()) {
					yearIndex -= 1;
					displayedYear = years[yearIndex];
				}
			}
			
			function getFollowingYear() {
				if (canYearBeIncremented()) {
					return years[yearIndex + 1];
				}
				
				else return displayedYear;
			}
			
			function interpolate(color1, color2, percent) {
				// Convert the hex colors to RGB values
				const r1 = parseInt(color1.substring(1, 3), 16);
				const g1 = parseInt(color1.substring(3, 5), 16);
				const b1 = parseInt(color1.substring(5, 7), 16);
	
				const r2 = parseInt(color2.substring(1, 3), 16);
				const g2 = parseInt(color2.substring(3, 5), 16);
				const b2 = parseInt(color2.substring(5, 7), 16);
	
				// Interpolate the RGB values
				const r = Math.round(r1 + (r2 - r1) * percent);
				const g = Math.round(g1 + (g2 - g1) * percent);
				const b = Math.round(b1 + (b2 - b1) * percent);
	
				// Convert the interpolated RGB values back to a hex color
				return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
			}

			function getFillColour(percentage) {				
				// From highest to middle colour
				if (percentage >= 50.0) {
					return interpolate(redLowestColour, redHighestColour, (percentage - 50.0) * 2.0 / 100.0);
				}
				// From lowest to middle colour
				else if (percentage >= 0.0) {
					return interpolate(blueHighestColour, blueLowestColour, percentage * 2.0 / 100.0);
				}
				else {
					return defaultColour;
				}
			}
			
			function getOutlineColour(percentage) {		
				if (percentage >= 50.0) {
					return redHighestColour;
				}
				else if (percentage >= 0.0) {
					return blueHighestColour;
				}
				else {
					return defaultColour;
				}
			}
			
			function resetHoverPopup() {
				if (hoverPopup) {
					hoverPopup.close();
					hoverPopup = null;
				}
			}
			
			fetch("./data/Election Results.csv")
				.then (response => response.text())
				.then ((data) => {
					results = Papa.parse(data).data;
					console.log(results);
					
					initialiseMap();
					initialiseBoundariesOfYear(displayedYear);
				})
				
			function getPAPVotePercentage(constituencyName) {
				const found = results.find( (element) => 
					element[0].localeCompare(displayedYear) == 0 && 
					element[1].localeCompare(constituencyName) == 0	&&
					element[4].localeCompare("PAP") == 0
					);
				
				if (found) {
					votePercentage = found[6];
					
					if (votePercentage.localeCompare("na") == 0) {
						return 100.0;
					}
					else {
						return found[6] * 100.0;
					}
				}
				else {
					return -1;
				}
			}
			
			function onEachConstituency(feature, layer) {
				layer.on({
					mouseover: highlightConstituency,
					mouseout: resetConstituencyHighlight
				});
			}
				
			function highlightConstituency(e) {
				var layer = e.target;
				
				layer.setStyle({
					weight: 3,
					fillOpacity: '0.8'
				});

				papVotePercentage = getPAPVotePercentage(layer.feature.properties['Constituency Name']);
				hoverPopup = L.popup(mousePosition, {
					offset: L.point(0, -15),
					autoPan: false,
					bubblingMouseEvents: true,
					closeButton: false,
					className: "hover-popup",
					pane: 'hoverPopup'
				})
					.setContent(getConstituencyDefaultText(layer))
					.openOn(map);
			
				layer.bringToFront();
			}
			
			function getConstituencyDefaultText(layer) {
				papVotePercentage = getPAPVotePercentage(layer.feature.properties['Constituency Name']);

				return ('<h2>' + layer.feature.properties.Description + '</h2>\n' + 
					   (papVotePercentage >= 100.0 ? ('PAP Won Uncontested') :
					    papVotePercentage >= 0.0 ? ('PAP Vote Share: ' + papVotePercentage.toFixed(2) + '%') : 
					    "No Data"));
			}
			
			function resetConstituencyHighlight(e) {
				var layer = e.target;
				geojson.resetStyle(layer);
				layer.bringToBack();
				
				resetHoverPopup();
			}
			
			function onEachChangedBoundary(feature, layer) {
				layer.on({
					mouseover: highlightChangedBoundary,
					mouseout: resetChangedBoundaryHighlight,
					click: zoomToFeature
				});
			}
		
			function highlightChangedBoundary(e) {
				var layer = e.target;
				
				layer.setStyle({
					weight: 3,
					fillOpacity: '0.5'
				});

				papVotePercentage = getPAPVotePercentage(layer.feature.properties['Old Constituency Name']);
				hoverPopup = L.popup(mousePosition, {
					offset: L.point(0, -15),
					autoPan: false,
					bubblingMouseEvents: true,
					closeButton: false,
					className: "hover-popup",
					pane: 'hoverPopup'
				})
				.setContent('<h2>Changed Boundaries:</h2>\n' +
							  '<h4>' + displayedYear + ': ' + layer.feature.properties['Old Description'] + '</h4>\n' + 
							  '<h4>' + getFollowingYear() + ': ' + layer.feature.properties['New Description'] + '</h4>\n' + 
							  (papVotePercentage >= 100.0 ? ('PAP Won Uncontested') :
							   papVotePercentage >= 0.0   ? ('PAP Vote Share: ' + papVotePercentage.toFixed(2) + '%') : 
															 "No Data"))
				.openOn(map);
			
				layer.bringToFront();
			}
			
			function resetChangedBoundaryHighlight(e) {
				changedGeojson.resetStyle(e.target);
				
				resetHoverPopup();
			}
			function exitOverlay() {
				resetOverlay();
				resetGeojsons();
			}
			
			function resetOverlay() {
				resetHoverPopup();
				map.setMaxBounds(maxBounds);
				
				if (exitOverlayButton) {
					exitOverlayButton.remove();
					exitOverlayButton = null;
				}
				if (overlayBackground) {
					overlayBackground.remove();
					overlayBackground = null;
				}
				
				if (voteMarginLegend) {
					voteMarginLegend.remove();
					voteMarginLegend = null;
				}
			}
			
			function resetGeojsons() {
				geojson.resetStyle();
				geojson.eachLayer(function(layer) {
					layer.off();
					onEachConstituency(layer.feature, layer);
				});

				changedGeojson.resetStyle();
				changedGeojson.eachLayer(function(layer) {
					layer.off();
					onEachChangedBoundary(layer.feature, layer);
				});
			}
			
			function initialiseMap() {
				var blank = L.tileLayer('');
			
				var osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
					maxZoom: 19,
					attribution: '© OpenStreetMap'
				});

				var osmHOT = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
					maxZoom: 19,
					attribution: '© OpenStreetMap contributors, Tiles style by Humanitarian OpenStreetMap Team hosted by OpenStreetMap France'});
										
				map = L.map('map', {
						layers: [blank],
						zoomControl: false
					})
					.setView([1.3521, 103.8198], 10.5)
					.setMinZoom(10.5)
					.setMaxZoom(15)
					.setMaxBounds(maxBounds);
					
				var baseMaps = {
					"Blank": blank,
					"OpenStreetMap": osm,
					"OpenStreetMap.HOT": osmHOT
				};
				
				layerControl = L.control.layers(baseMaps).addTo(map);
				
				var hoverPopupPane = map.createPane('hoverPopup');
				hoverPopupPane.style.zIndex = 1500;
				hoverPopupPane.style.pointerEvent = 'none';
				
				map.addEventListener('mousemove', (event) => {
					mousePosition = event.latlng;
					
					if (hoverPopup) {
						hoverPopup.setLatLng(mousePosition);
					}
				});
				
				L.Control.DecrementButton = L.Control.extend({
					options: {
						position: 'topleft'
					},
					onAdd: function (map) {
						var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
						var button = L.DomUtil.create('a', 'leaflet-control-button', container);
						L.DomEvent.disableClickPropagation(button);
						L.DomEvent.on(button, 'click', function(){
							decrementYear();
							initialiseBoundariesOfYear(displayedYear);
						});

						container.title = "Title";

						return container;
					},
					onRemove: function(map) {},
				});
				L.Control.IncrementButton = L.Control.extend({
					options: {
						position: 'topright'
					},
					onAdd: function (map) {
						var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
						var button = L.DomUtil.create('a', 'leaflet-control-button', container);
						L.DomEvent.disableClickPropagation(button);
						L.DomEvent.on(button, 'click', function(){
							incrementYear();
							initialiseBoundariesOfYear(displayedYear);
						});

						container.title = "Title";

						return container;
					},
					onRemove: function(map) {},
				});
				var decrementButton = new L.Control.DecrementButton();
				decrementButton.addTo(map);
				
				var incrementButton = new L.Control.IncrementButton();
				incrementButton.addTo(map);
				
				initialiseConstituencyLegend();
				
				function initialiseConstituencyLegend() {
					var legend = L.control({position: 'bottomright'});

					legend.onAdd = function(map) {
						var div = L.DomUtil.create("div", "mainLegend");
						div.innerHTML += "<h4>Legend</h4>";
						div.innerHTML += "<h3>PAP Vote Share</h3>";
						div.innerHTML += "<h2L>0%</h2L>";
						div.innerHTML += "<h2R>100%</h2R><br><br>";
						for (let i = 0; i < 100; ++i) {
							div.innerHTML += '<i style="background:' + getFillColour(i) +'"></i>'
						}

					return div;
					};
					
					legend.addTo(map);
				}
			}
			
			function initialiseBoundariesOfYear(year) {
				resetOverlay();
				
				if (geojson) {
					geojson.remove();
				}
				
				function styleMap(feature) {
					const votePercentage = getPAPVotePercentage(feature.properties["Constituency Name"]);
					return {
						fillColor: getFillColour(votePercentage),
						weight: 1.5,
						opacity: 1,
						color: getOutlineColour(votePercentage),
						fillOpacity: '0.75',
						dashOpacity: '0.5',
						zIndex: 200
					};
				}

				geojson = L.geoJSON.ajax(getBoundariesDataOfYear(year), { 
					style: styleMap,
					onEachFeature: onEachConstituency
				}).addTo(map);
				
				initialiseChangedBoundariesOfYear(year);
				
				if (yearIndicatorControl) {
					yearIndicatorControl.remove();
				}
				
				yearIndicatorControl = L.control();

				yearIndicatorControl.onAdd = function (map) {
					this._div = L.DomUtil.create('div', 'info'); // create a div with a class "info"
					this.update();
					return this._div;
				};

				// method that we will use to update the control based on feature properties passed
				yearIndicatorControl.update = function (props) {
					this._div.innerHTML = '<h4>' + displayedYear + '</h4>';
				};

				yearIndicatorControl.addTo(map);
			}
			
			function initialiseChangedBoundariesOfYear(year) {
				if (changedGeojson) {
					changedGeojson.remove();
					layerControl.removeLayer(changedGeojson);
				}
				
				changedGeojson = L.geoJSON.ajax(getChangedBoundariesDataOfYear(year), {
					style: styleChangedBoundariesInactive,
					onEachFeature: onEachChangedBoundary
				});
				
				var overlayChangedBoundaries = {
					"Show Changed Boundaries": changedGeojson
				};
				
				layerControl.addOverlay(changedGeojson, "Show Changed Boundaries");
				
				function styleChangedBoundariesInactive(feature) {
					const votePercentage = getPAPVotePercentage(feature.properties["Constituency Name"]);
					return {
						fillColor: 'black',
						weight: 2,
						opacity: 1,
						color: 'black',
						fillOpacity: '0.25',
						dashOpacity: '1',
						dashArray: '4 5',
						zIndex: 600,
						bubblingMouseEvents: false
					};
				}
			}
									
			function zoomToFeature(e) {
				const positiveDifferenceColour = '#7f3b08';
				const middleColour = '#f7f7f7';
				const negativeDifferenceColour = '#2d004b';
				
				const selectedConstituencyLayer = e.target;
				const selectedConstituencyName = selectedConstituencyLayer.feature.properties['Old Constituency Name'];
				var mainConstituency;
				var allRemovedBoundariesLayers = [];
				var allAddedBoundariesLayers = [];
				var focusedFeatures = [];
				
				resetHoverPopup();
				
				changedGeojson.eachLayer(function(layer) {						
					const oldConstituencyName = layer.feature.properties['Old Constituency Name'];
					const newConstituencyName = layer.feature.properties['New Constituency Name'];
					
					layer.off();
					
					// Find the list of constituencies that this constituency's boundaries has been moved to
					if (selectedConstituencyName.localeCompare(oldConstituencyName) == 0) {
						layer.on({
							mouseover: highlightRemovedBoundary,
							mouseout: resetRemovedBoundaryHighlight
						});
						
						allRemovedBoundariesLayers.push(layer);
						focusedFeatures.push(layer);
					}
					
					// Find the list of constituencies that have been added to this constituency's boundaries
					else if (doesBoundaryNameMatch(newConstituencyName, selectedConstituencyName)) {
						layer.on({
							mouseover: highlightAddedBoundary,
							mouseout: resetAddedBoundaryHighlight
						});
						allAddedBoundariesLayers.push(layer);
						focusedFeatures.push(layer);
					}
					
					// Hide all other layers
					else {
						layer.setStyle({
							weight: 1,
							fillOpacity: 0.03,
							opacity: 0.1
						});
					}
				});

				geojson.eachLayer(function(layer) {
					const constituencyName = layer.feature.properties['Constituency Name'];
					
					layer.off();
					
					// Find the main constituency's layer
					if (doesBoundaryNameMatch(constituencyName, selectedConstituencyName)) {
						focusedFeatures.push(layer);
						
						mainConstituency = layer;
						
						mainConstituency.on({
							mouseover: highlightMainConstituency,
							mouseout: resetMainConstituencyHighlight
						});
					}
					else {
						layer.setStyle({
							weight: 1,
							fillOpacity: 0.05,
							opacity: 0.1
						});
					}
				});
				
				styleMainConstituency();
				styleRemovedBoundaries();
				styleAddedBoundaries();
				
				console.log(focusedFeatures);	
				
				var featureGroup = L.featureGroup(focusedFeatures);
				var featureBounds = featureGroup.getBounds().pad(1.1);
				
				const desiredZoom = map.getBoundsZoom(featureBounds, false);
				map.setZoom(desiredZoom);
				map.setMaxBounds(featureBounds);
				map.fitBounds(featureBounds);
				
				// Black background
				overlayBackground = L.rectangle(maxBounds, {
					fillColor: 'black',
					fillOpacity: '0.7'
				}).addTo(map).bringToBack();
				
				// Button to exit the overlay
				L.Control.ExitOverlayButton = L.Control.extend({
					options: {
						position: 'bottomleft'
					},
					onAdd: function (map) {
						var button = L.DomUtil.create('a', 'info');
						button.innerHTML = "Exit Overlay";
						L.DomEvent.disableClickPropagation(button);
						L.DomEvent.on(button, 'click', function(){
							exitOverlay();
							this.remove();
						});

						return button;
					},
					onRemove: function(map) {},
				});
				
				exitOverlayButton = new L.Control.ExitOverlayButton();
				exitOverlayButton.addTo(map);
				
				initialiseVoteMarginLegend();
				
				function initialiseVoteMarginLegend() {
					voteMarginLegend = L.control({position: 'bottomright'});

					voteMarginLegend.onAdd = function(map) {
						var div = L.DomUtil.create("div", "mainLegend");
						div.innerHTML += "<h4>Legend</h4>";
						div.innerHTML += "<h3>PAP Vote Share</h3>";
						for (let i = 0; i < 100; ++i) {
							div.innerHTML += '<i style="background:' + getFillColour(i) +'"></i>'
						}

					return div;
					};
					
					voteMarginLegend.addTo(map);
				}
				
				function styleMainConstituency() {
					mainConstituency.setStyle({
						weight: 4
					});
				}
				
				function styleRemovedBoundaries() {
					for (const removedBoundary of allRemovedBoundariesLayers) {
						styleRemovedBoundary(removedBoundary);
					}
				}
				
				function styleRemovedBoundary(removedBoundary) {
					removedBoundary.setStyle({
						fillColor: '#80cdc1',
						weight: 3,
						color: '#01665e',
						fillOpacity: '0.85'
					});
				}
				
				function styleAddedBoundaries() {					
					for (const addedBoundary of allAddedBoundariesLayers) {
						styleAddedBoundary(addedBoundary);
					}
				}
				
				function styleAddedBoundary(addedBoundary) {
					const originConstituencyName = addedBoundary.feature.properties['Old Constituency Name'];
					const selectedConstituencyVoteShare = getPAPVotePercentage(selectedConstituencyName);
					const selectedConstituencyWinMargin = getWinMargin(selectedConstituencyVoteShare);
					const originConstituencyVoteShare = getPAPVotePercentage(originConstituencyName);
					const originConstituencyWinMargin = getWinMargin(originConstituencyVoteShare);
					// From added, minus, selected, to highlight boundary changes from strongholds
					const voteShareDifference = originConstituencyWinMargin - selectedConstituencyWinMargin;
					
					console.log(originConstituencyName + voteShareDifference);
					addedBoundary.setStyle({
						fillColor: getWinMarginDifferenceFillColour(voteShareDifference),
						color: getWinMarginDifferenceLineColour(voteShareDifference),
						weight: 3,
						fillOpacity: '0.85'
					});
				}
				
				function highlightMainConstituency(e) {
					styleMainConstituency();
					
					var layer = e.target;
					
					layer.setStyle({
						fillOpacity: '1.0'
					});

					hoverPopup = L.popup(mousePosition, {
						offset: L.point(0, -15),
						autoPan: false,
						bubblingMouseEvents: true,
						closeButton: false,
						className: "hover-popup",
						pane: 'hoverPopup'
					})
						.setContent(getConstituencyDefaultText(layer))
						.openOn(map);
				}
				
				function highlightRemovedBoundary(e) {
					var layer = e.target;
					
					layer.setStyle({
						weight: 3,
						fillOpacity: '1.0'
					});

					hoverPopup = L.popup(mousePosition, {
						offset: L.point(0, -15),
						autoPan: false,
						bubblingMouseEvents: true,
						closeButton: false,
						className: "hover-popup",
						pane: 'hoverPopup'
					})
					.setContent('<h2>' + layer.feature.properties['Old Description'] + '\n</h2>' +
								  '<h4>Moved TO ' + layer.feature.properties['New Description'] + ' in ' + getFollowingYear() + '</h4>')
					.openOn(map);
				
					layer.bringToFront();
				}
				
				function resetRemovedBoundaryHighlight(e) {
					styleRemovedBoundary(e.target);
					
					resetHoverPopup();
				}
				
				function highlightAddedBoundary(e) {
					var layer = e.target;
					
					const addedConstituencyName = layer.feature.properties['Old Constituency Name'];
					
					const mainConstituencyVoteShare = getPAPVotePercentage(selectedConstituencyName);
					const mainConstituencyWinMargin = getWinMargin(mainConstituencyVoteShare);
					const addedConstituencyVoteShare = getPAPVotePercentage(addedConstituencyName);
					const addedConstituencyWinMargin = getWinMargin(addedConstituencyVoteShare);
					
					const WinMarginDifference = addedConstituencyWinMargin - mainConstituencyWinMargin;
					
					layer.setStyle({
						weight: 3,
						fillOpacity: '1.0'
					});

					hoverPopup = L.popup(mousePosition, {
						offset: L.point(0, -15),
						autoPan: false,
						bubblingMouseEvents: true,
						closeButton: false,
						className: "hover-popup",
						pane: 'hoverPopup'
					})
				
					
					.setContent(getConstituencyDefaultText(mainConstituency) +
								', Win Margin: ' + mainConstituencyWinMargin.toFixed(2) + '%' +
								'<h4>Moved FROM ' + layer.feature.properties['Old Description'] + ' in ' + getFollowingYear() + '</h4>' +
								'PAP Vote Share: ' + addedConstituencyVoteShare.toFixed(2) + '%' +
								', Win Margin: ' + addedConstituencyWinMargin.toFixed(2) + '%' +
								'<h4>Win Margin Difference: ' + WinMarginDifference.toFixed(2) + '%</h4>'
								)
					.openOn(map);
				
					layer.bringToFront();
				}
				
				function resetAddedBoundaryHighlight(e) {
					styleAddedBoundary(e.target);
					
					resetHoverPopup();
				}
				
				function resetMainConstituencyHighlight(e) {
					styleMainConstituency();
					
					resetHoverPopup();
				}
				
				function getWinMargin(voteShare) {
					return voteShare - (100.0 - voteShare); 
				}
				
				function getWinMarginDifferenceFillColour(percentageDifference) {
					if (percentageDifference > 0.0) {
						return interpolate(middleColour, positiveDifferenceColour, percentageDifference / 100.0);
					}
					else {
						return interpolate(middleColour, negativeDifferenceColour, percentageDifference * -1.0 / 100.0);
					}
				}
				
				function getWinMarginDifferenceLineColour(percentageDifference) {
					if (percentageDifference > 0.0) {
						return positiveDifferenceColour;
					}
					else {
						return negativeDifferenceColour;
					}
				}
			}
		</script>
	</body>
</html>
